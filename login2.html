<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Mapeamento de Saúde</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body class="login-body">

    <div id="grad1">
        <header class="nav-bar">
            <div id="navbar">
                <a href="index.html">Página Inicial</a>
                <a href="contact.asp">Contato</a>
                <a href="about.asp">Sobre</a>
            </div>
        </header>
    </div> <div class="login-wrapper">
        <div class="login-container signup-container">
            
            <div class="signup-header">
                <h2>CRIE SUA CONTA</h2>
                <p>Preencha os campos abaixo para se cadastrar</p>
            </div>

            <form action="login1.html" method="GET">
                
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="input-group password-group">
                    <label for="confirmar_senha">Confirmar Senha</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a senha" required>
                </div>

                <div class="terms-group">
                    <label>
                        <input type="checkbox" name="termos" required>
                        <span>Eu aceito os termos e condições.</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit btn-signup">
                    Finalizar Cadastro
                </button>
            </form>

            <div class="footer-link">
                Já tem uma conta? 
                <a href="login.html" class="signup-link link-blue">
                    Faça login
                </a>
            </div>
            
        </div>
    </div>

    <footer class="footer">
        <div class="col-1">
            <b>Localize sua Saúde</b>
        </div>
        <div class="col-2">
            <b>Plataforma</b>
            <a href="time.asp">Nosso time</a>
        </div>
        <div class="col-3">
            <b>Saiba Mais</b>
            <a href="quemsomos.asp">Quem somos?</a>
            <a href="nossasmotivacoes.asp">Nossas motivações</a>
        </div>
    </footer>

</body>
</html>
