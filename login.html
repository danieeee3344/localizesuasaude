<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mapeamento de Saúde</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body class="login-body">

    <div id="grad1">
        <header class="nav-bar">
            <div id="navbar">
                <a href="index.html">Página Inicial</a>
                <a href="contact.asp">Contato</a>
                <a href="about.asp">Sobre</a>
            </div>
        </header>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <h2>Mapeamento de saúde</h2>

            <form action="principal.html">
                <div class="input-group">
                    <label for="user">Usuário</label>
                    <input type="text" id="user" required>
                </div>

                <div class="input-group password-group">
                    <label for="pass">Senha</label>
                    <input type="password" id="pass" required>
                </div>

                <button type="submit" class="btn-submit">
                    ENTRAR
                </button>
            </form>

            <a href="login2.html" class="signup-link">
                Cadastre-se.
            </a>
        </div>
    </div>

    <footer class="footer">
        <div class="col-1">
            <b>Localize sua Saúde</b>
        </div>
        <div class="col-2">
            <b>Plataforma</b>
            <a href="time.asp">Nosso time</a>
        </div>
        <div class="col-3">
            <b>Saiba Mais</b>
            <a href="quemsomos.asp">Quem somos?</a>
            <a href="nossasmotivacoes.asp">Nossas motivações</a>
        </div>
    </footer>

</body>
</html>
